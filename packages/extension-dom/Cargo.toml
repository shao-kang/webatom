[package]
name = "webatom_extension_dom"
version = "0.1.0"
edition = "2024"

[dependencies]
slab        = { workspace = true }
markup5ever = { workspace = true }
html5ever   = { workspace = true }
rquickjs    = { workspace = true, features = ["macro", "classes"]  }
tokio = { workspace = true }
webatom-js-runtime = { workspace = true }
tracing = { workspace = true }
webatom-blitz-msg = { workspace = true }
reqwest           = { workspace = true }
serde_json = "1"

[dev-dependencies]
tokio              = { workspace = true }
tracing-subscriber = { workspace = true }

[[test]]
name = "dom"
path = "test/dom/dom.rs"

[[test]]
name = "html_entry"
path = "test/html_entry/html_entry.rs"

[[test]]
name = "html_entry_script"
path = "test/html_entry_script/html_entry_script.rs"

[[test]]
name = "dom_tree"
path = "test/dom_tree/dom_tree.rs"
