<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>webAtom</title>
</head>
<body>
  <div style="padding: 20px; font-family: sans-serif;">
    <h1>Hello webAtom</h1>
    <p class="red" style=" background: #f0f">JS runtime + DOM extension</p>
  </div>
  <style>
    body{
      background-color: #f0f0f0;
    }
    .red {
      color: #f00;
    }
  </style>
  <script>
    let num = 0
    const append = ()=> {
      const text = document.createTextNode('ssssss' + num)
      num++;
      const div = document.createElement('div');
      div.addEventListener('click', (e)=> {
        console.log('click', e.target)
        e.currentTarget.append('ddddd')

      })
      console.log(div)
      div.appendChild(text)
      document.body.appendChild(div);
    }
    const intervalId = setInterval(()=> {
      console.log('append' + num)
      append()
      if(num > 5) {
        clearInterval(intervalId)
      }

    }, 2000)
  </script>
</body>
</html>
