<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>webAtom</title>
</head>
<body>
  <div style="padding: 20px; font-family: sans-serif;">
    <h1>Hello webAtom</h1>
    <p>JS runtime + DOM extension 已接入</p>
  </div>
  <script>
    const append = ()=> {
      const text = document.createTextNode('ssssss')
      const div = document.createElement('div');
      console.log(div)
      div.appendChild(text)
      document.body.appendChild(div);
    }
    setInterval(()=> {
      console.log('append')
      append()

    }, 1000)
  </script>
</body>
</html>
