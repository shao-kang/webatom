[package]
name = "web-atom-js-runtime"
version = "0.1.0"
edition = "2024"

[lib]
name = "js_runtime"
path = "src/lib.rs"

[[bin]]
name = "js-runtime"
path = "src/main.rs"

[dependencies]
rquickjs = { version = "0.9", features = ["full", "futures"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "time", "sync", "macros"] }
