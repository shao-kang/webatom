[package]
name = "webatom-js-runtime"
version = "0.1.0"
edition = "2024"

[lib]
name = "js_runtime"
path = "src/lib.rs"

[[bin]]
name = "js-runtime"
path = "src/main.rs"

[dependencies]
rquickjs = { workspace = true}
reqwest = { workspace = true }
tokio = { workspace = true }
tracing = {workspace = true}
tracing-subscriber = { workspace = true }
webatom-js-runtime-macro = { workspace = true }
strum = { version = "0.28.0", features = ["derive", "strum_macros"] }
tokio-util = "0.7.18"
slab = "0.4"

[dev-dependencies]
tokio = { workspace = true, features = ["test-util", "net", "io-util"] }
